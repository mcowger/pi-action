name: Update Bun Dependencies

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow: runs `bun update` and opens a PR with the changes.
#
# Outputs:
#   pr-url – The full URL of the created PR (empty when no changes detected).
#
# USAGE – from any bun-based repository:
#
#   jobs:
#     update-deps:
#       uses: shaftoe/pi-coding-agent-action/.github/workflows/update-bun-deps.yml@v2
#       with:
#         working-directory: .
#         latest: false
#         validate-command: "bun run test && bun run validate"
#       secrets:
#         token: ${{ secrets.GITHUB_TOKEN }}
#
# The workflow can also be dispatched manually from the Actions tab.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Path to the directory containing package.json (e.g. '.' or 'site')."
        required: false
        type: string
        default: "."

      latest:
        description: "Use --latest flag to bump across semver ranges (major updates)."
        required: false
        type: boolean
        default: false

      validate-command:
        description: "Command to run after updating (e.g. 'bun run test && bun run validate'). Skipped if empty."
        required: false
        type: string
        default: ""

      node-version:
        description: "Node.js version to use."
        required: false
        type: string
        default: current

      bun-version:
        description: "Bun version to install."
        required: false
        type: string
        default: "latest"

    secrets:
      token:
        description: "GitHub token for PR creation."
        required: true

    outputs:
      pr-url:
        description: "The full URL of the created PR (empty when no changes)."
        value: ${{ jobs.update-dependencies.outputs.pr-url }}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest

    outputs:
      pr-url: ${{ steps.create-pr.outputs.pr-url }}

    env:
      GH_TOKEN: "${{ secrets.token }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "${{ inputs.bun-version }}"

      - name: Install dependencies
        working-directory: "${{ inputs.working-directory }}"
        run: bun install --frozen-lockfile

      - name: Update dependencies
        working-directory: "${{ inputs.working-directory }}"
        run: |
          if [ "${{ inputs.latest }}" = "true" ]; then
            bun update --latest
          else
            bun update
          fi

      - name: Check for changes
        id: changes
        working-directory: "${{ inputs.working-directory }}"
        run: |
          FILES=""
          for f in bun.lock bun.lockb package.json; do
            if [ -f "$f" ] && ! git diff --quiet "$f" 2>/dev/null; then
              FILES="$FILES $f"
            fi
          done
          FILES="$(echo "$FILES" | sed 's/^ *//')"
          if [ -n "$FILES" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes detected."
          fi

      - name: Validate
        if: ${{ steps.changes.outputs.changed == 'true' && inputs.validate-command != '' }}
        working-directory: "${{ inputs.working-directory }}"
        run: ${{ inputs.validate-command }}

      - name: Create Pull Request
        id: create-pr
        if: ${{ steps.changes.outputs.changed == 'true' }}
        working-directory: "${{ inputs.working-directory }}"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          BRANCH="deps/bun-update-${TIMESTAMP}"
          TITLE="chore(deps): update bun dependencies"

          git checkout -b "$BRANCH"
          git add ${{ steps.changes.outputs.files }}
          git commit -m "$TITLE"
          git push origin "$BRANCH"

          # Build PR body
          {
            echo "## Updated dependencies"
            echo ""
            echo "\`\`\`"
            git diff --stat HEAD~1
            echo "\`\`\`"
            echo ""
            echo "<details><summary>Diff</summary>"
            echo ""
            echo "\`\`\`diff"
            git diff HEAD~1 -- ${{ steps.changes.outputs.files }}
            echo "\`\`\`"
            echo "</details>"
          } > /tmp/pr-body.md

          PR_ARGS=(
            pr create
            --title "$TITLE"
            --body-file /tmp/pr-body.md
            --head "$BRANCH"
          )

          PR_URL="$(gh "${PR_ARGS[@]}")"
          echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"

name: Build, test and upload coverage

on:
  workflow_call:
    inputs:
      e2e:
        type: boolean
        required: false
        default: false
    secrets:
      token:
        required: false

permissions:
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run checks
        run: bun run validate

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          verbose: true
          use_oidc: true

      - name: Run e2e tests
        if: inputs.e2e == true
        run: bun run test:e2e
        env:
          E2E_PROVIDER: ${{ vars.PROVIDER }}
          E2E_MODEL: ${{ vars.MODEL_LIGHT }}
          E2E_TOKEN: ${{ secrets.token }}

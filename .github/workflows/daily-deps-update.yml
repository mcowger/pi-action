name: Daily Dependency Update

# ─────────────────────────────────────────────────────────────────────────────
# Runs daily at 06:00 UTC and can also be triggered manually.
# Calls the reusable update-bun-deps workflow to bump packages and open a PR,
# then uses the Pi coding agent to review the PR for breaking changes.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC
  workflow_dispatch:

# NOTE: We use PAT_TOKEN instead of GITHUB_TOKEN so that the PR created by
# update-bun-dependencies-action triggers downstream workflows (e.g. pr.yml).
# Events triggered by GITHUB_TOKEN do not fire other workflows (GitHub prevents
# recursive runs). A PAT bypasses this restriction.

# NOTE: We use PAT_TOKEN instead of GITHUB_TOKEN so that the PR created by
# update-bun-dependencies-action triggers downstream workflows (e.g. pr.yml).
# Events triggered by GITHUB_TOKEN do not fire other workflows (GitHub prevents
# recursive runs). A PAT bypasses this restriction.

jobs:
  update-deps:
    runs-on: ubuntu-latest
    outputs:
      pr-url: ${{ steps.update-deps.outputs.pr-url }}
      updated-packages: ${{ steps.update-deps.outputs.updated-packages }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Update dependencies
        id: update-deps
        uses: shaftoe/update-bun-dependencies-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          latest: 'true'
          create-pr: 'true'
          pr-branch: 'deps/update'
          pr-title: 'chore: update dependencies'
          pr-commit-message: 'chore: update dependencies'
          pr-labels: 'dependencies,automated'

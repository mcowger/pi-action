name: Daily Dependency Update

# ─────────────────────────────────────────────────────────────────────────────
# Runs daily at 06:00 UTC and can also be triggered manually.
# Calls the reusable update-bun-deps workflow to bump packages and open a PR,
# then uses the Pi coding agent to review the PR for breaking changes.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-deps:
    uses: ./.github/workflows/update-bun-deps.yml
    with:
      latest: true
      validate-command: "bun run test && bun run validate"
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  pi-review:
    needs: update-deps
    if: ${{ needs.update-deps.outputs.pr-url != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Pi dependency review
        uses: shaftoe/pi-coding-agent-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: ${{ vars.PROVIDER }}
          model: ${{ vars.MODEL }}
          token: ${{ secrets.API_KEY }}
          thinking_level: ${{ vars.THINKING_LEVEL }}
          prompt: >
            Review PR #${{ needs.update-deps.outputs.pr-url }}

            Focus on:
            - Breaking changes introduced by upgraded dependencies
            - Deprecated APIs that may be removed in future releases
            - If the Pi coding agent SDK (@mariozechner/pi-coding-agent) has been upgraded,
              highlight any new APIs, features, or use cases that the project could adopt
            - Any compatibility issues with the current codebase

            Summarize your findings as a comment on the PR. If everything looks safe,
            confirm that the upgrades are compatible and note any improvements.

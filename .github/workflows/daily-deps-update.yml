name: Daily Dependency Update

# ─────────────────────────────────────────────────────────────────────────────
# Runs daily at 06:00 UTC and can also be triggered manually.
# Calls the reusable update-bun-deps workflow to bump packages and open a PR.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 6 * * *" # every day at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    uses: ./.github/workflows/update-bun-deps.yml
    with:
      latest: true
      validate-command: "bun run test && bun run validate"
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

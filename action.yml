name: 'pi-action'
description: 'Invoke the pi coding agent on GitHub issues and PRs via comment triggers'
author: 'Carlos Villela'
branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  github_token:
    description: 'GitHub token for API access (issues, PRs, reactions, comments)'
    required: true
  gist_token:
    description: 'GitHub token with gist scope for session sharing (optional, falls back to github_token)'
    required: false
  pi_auth_json:
    description: 'Contents of ~/.pi/agent/auth.json for OAuth authentication'
    required: false
  pi_models_json:
    description: 'Contents of ~/.pi/agent/models.json for custom model definitions'
    required: false
  trigger_phrase:
    description: 'Phrase to trigger pi (e.g., @pi)'
    default: '@pi'
  allowed_bots:
    description: 'Comma-separated list of allowed bot usernames'
    default: ''
  timeout:
    description: 'Execution timeout in seconds'
    default: '1800'
  provider:
    description: 'LLM provider (anthropic, openai, google, etc.)'
    default: 'anthropic'
  model:
    description: 'Model ID'
    default: 'claude-sonnet-4-20250514'
  prompt_template:
    description: 'Custom prompt template with placeholder variables'
    required: false
  share_session:
    description: 'Include a link to the full session HTML in the response comment'
    required: false
    default: 'true'
  output_mode:
    description: 'How to deliver results: comment (post to issue/PR) or output (set action outputs only)'
    required: false
    default: 'comment'
  prompt:
    description: 'Direct prompt for the agent (no issue/PR context needed, requires output_mode: output)'
    required: false
    default: ''

outputs:
  response:
    description: 'The agent response text (when output_mode is output)'
  success:
    description: 'Whether the agent succeeded (true/false)'
  share_url:
    description: 'URL to the shared session HTML (if share_session is enabled)'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install action dependencies
      shell: bash
      run: npm ci --prefix ${{ github.action_path }}
    
    - name: Run pi-action
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npx tsx src/index.ts
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_GIST_TOKEN: ${{ inputs.gist_token }}
        INPUT_PI_AUTH_JSON: ${{ inputs.pi_auth_json }}
        INPUT_PI_MODELS_JSON: ${{ inputs.pi_models_json }}
        INPUT_TRIGGER_PHRASE: ${{ inputs.trigger_phrase }}
        INPUT_ALLOWED_BOTS: ${{ inputs.allowed_bots }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_PROMPT_TEMPLATE: ${{ inputs.prompt_template }}
        INPUT_SHARE_SESSION: ${{ inputs.share_session }}
        INPUT_OUTPUT_MODE: ${{ inputs.output_mode }}
        INPUT_PROMPT: ${{ inputs.prompt }}

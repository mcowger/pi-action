name: 'pi GitHub Action'
description: 'Run the pi coding agent (pi.dev) in GitHub Actions workflows'
branding:
  icon: 'terminal'
  color: 'purple'

inputs:
  github_token:
    description: 'GitHub token for API access'
    required: true

  provider:
    description: 'LLM provider (e.g. openai, google, anthropic, zai, etc.)'
    required: true

  model:
    description: 'Model to use (e.g., gpt-5.4, gpt-4o, gemini-2.5-pro)'
    required: true

  token:
    description: 'API token for the LLM provider. Required for most providers, but can be omitted when using providers that support alternative auth mechanisms (e.g. google-vertex with Application Default Credentials).'
    required: false

  thinking_level:
    description: 'Thinking level (e.g. off, low, medium, high)'
    required: false
    default: 'off'

  prompt:
    description: 'Optional prompt to send to the agent. When provided, the trigger phrase is not required and the prompt is used as-is (useful for non-interactive workflows). Falls back to extracting the prompt from the triggering comment if not set. Mutually exclusive with prompt_file.'
    required: false

  prompt_file:
    description: 'Path to a Markdown/text file containing the prompt template (relative to the repository root). Supports {{VAR_NAME}} placeholders that are replaced with the corresponding environment variables at runtime. Mutually exclusive with prompt.'
    required: false

  trigger:
    description: 'Trigger phrase for the pi agent (e.g. /pi)'
    required: false
    default: '/pi'

  extensions:
    description: 'Custom Pi extensions to load (one per line). Supports npm packages (npm:package-name), git repos (git:github.com/user/repo), or local file paths.'
    required: false
    default: ''

  load_builtin_extensions:
    description: 'Whether to load built-in GitHub extensions (create_pull_request, update_pull_request, get_issue_or_pr_thread)'
    required: false
    default: 'true'

  base_url:
    description: 'Optional override for the provider base URL (e.g. to route OpenAI traffic through a proxy or use an OpenAI-compatible gateway).'
    required: false
    default: ''

  export_session_html:
    description: 'Export the Pi session as a self-contained HTML file and expose its path via the `session_html_path` output. Set to false to disable.'
    required: false
    default: 'false'

  suppress_final_comment:
    description: 'When true, the final summary comment is not posted on the issue/PR. Useful when the agent itself posts comments during execution and a redundant summary is not desired.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - run: bun install --frozen-lockfile
      shell: bash
      working-directory: ${{ github.action_path }}

    - id: run
      run: bun run ${{ github.action_path }}/src/run.ts
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_THINKING_LEVEL: ${{ inputs.thinking_level }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_PROMPT_FILE: ${{ inputs.prompt_file }}
        INPUT_TRIGGER: ${{ inputs.trigger }}
        INPUT_EXTENSIONS: ${{ inputs.extensions }}
        INPUT_LOAD_BUILTIN_EXTENSIONS: ${{ inputs.load_builtin_extensions }}
        INPUT_BASE_URL: ${{ inputs.base_url }}
        INPUT_EXPORT_SESSION_HTML: ${{ inputs.export_session_html }}
        INPUT_SUPPRESS_FINAL_COMMENT: ${{ inputs.suppress_final_comment }}

outputs:
  response:
    description: 'The main agent response text'
    value: ${{ steps.run.outputs.response }}
  success:
    description: 'Whether the agent completed successfully (true/false)'
    value: ${{ steps.run.outputs.success }}
  input_tokens:
    description: 'Number of input tokens consumed'
    value: ${{ steps.run.outputs.input_tokens }}
  output_tokens:
    description: 'Number of output tokens generated'
    value: ${{ steps.run.outputs.output_tokens }}
  cost:
    description: 'Cost of the invocation in USD'
    value: ${{ steps.run.outputs.cost }}
  duration_seconds:
    description: 'Wall-clock duration of agent execution in seconds'
    value: ${{ steps.run.outputs.duration_seconds }}
  session_html_path:
    description: 'Path to the exported session HTML file (when export_session_html is enabled)'
    value: ${{ steps.run.outputs.session_html_path }}

name: 'pi-action'
description: 'Invoke the pi coding agent on GitHub issues and PRs via comment triggers'
author: 'Carlos Villela'
branding:
  icon: 'cpu'
  color: 'purple'

inputs:
  github_token:
    description: 'GitHub token for API access'
    required: true
  pi_auth_json:
    description: 'Contents of ~/.pi/agent/auth.json for OAuth authentication'
    required: false
  trigger_phrase:
    description: 'Phrase to trigger pi (e.g., @pi)'
    default: '@pi'
  allowed_bots:
    description: 'Comma-separated list of allowed bot usernames'
    default: ''
  timeout:
    description: 'Execution timeout in seconds'
    default: '300'
  provider:
    description: 'LLM provider (anthropic, openai, google, etc.)'
    default: 'anthropic'
  model:
    description: 'Model ID'
    default: 'claude-sonnet-4-20250514'

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      shell: bash
      run: npm ci --prefix ${{ github.action_path }}
    
    - name: Run pi-action
      shell: bash
      run: node ${{ github.action_path }}/dist/index.js
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_PI_AUTH_JSON: ${{ inputs.pi_auth_json }}
        INPUT_TRIGGER_PHRASE: ${{ inputs.trigger_phrase }}
        INPUT_ALLOWED_BOTS: ${{ inputs.allowed_bots }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
